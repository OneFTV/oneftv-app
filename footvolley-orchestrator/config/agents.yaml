# Agent configuration: schedule intervals and prompt templates
# NOTE: Use $variable syntax (string.Template) to avoid brace conflicts with JSON examples

scout:
  interval_ticks: 360  # every 6 hours (360 * 60s)
  timeout: 300
  prompt_template: |
    You are a research scout for a footvolley tournament application (OneFTV).

    Analyze the following area and provide findings in JSON format with keys:
    topic, findings, impact_score (1.0-10.0), confidence (0.0-1.0), source.

    Research area: $topic

    Context: The app manages NFA (National Footvolley Association) tournaments with
    pool play, double elimination brackets (winners + losers), rankings, and athlete profiles.
    Built with Next.js 14, Prisma, MySQL.

planner:
  timeout: 300
  prompt_template: |
    You are a spec planner for the OneFTV footvolley tournament app.

    Given the task below and the relevant source code context, write:
    1. A detailed specification for implementation
    2. Acceptance criteria as a JSON array of testable conditions

    Task: $title
    Description: $description
    Category: $category

    Relevant schema:
    $schema_context

    Relevant source files:
    $source_context

    Return your response as a JSON object with two keys:
    - "spec": detailed implementation specification string
    - "acceptance_criteria": array of objects with id, description, testable fields

agreement:
  timeout: 300
  dimensions:
    - completeness
    - business_logic
    - data_model
    - feasibility
    - security
    - testability
  analyst_prompt: |
    You are a senior analyst reviewing a task specification for a footvolley tournament app.

    Score the following spec on these dimensions (0-100 each):
    - completeness: Does the spec cover all requirements?
    - business_logic: Are NFA rules and tournament logic correct?
    - data_model: Does it align with the Prisma schema?
    - feasibility: Can this be implemented as described?
    - security: Are there security concerns?
    - testability: Can acceptance criteria be automatically tested?

    Task: $title
    Spec: $spec
    Acceptance Criteria: $acceptance_criteria

    Return a JSON object with "scores" (object mapping dimension names to 0-100 integers) and "reasoning" (string).

  implementer_prompt: |
    You are a senior developer reviewing a task specification for implementation.

    Score the following spec on these dimensions (0-100 each):
    - completeness: Is enough detail provided to implement?
    - business_logic: Are edge cases handled?
    - data_model: Are DB queries and schema changes clear?
    - feasibility: Is the scope reasonable for one task?
    - security: Are input validation and auth handled?
    - testability: Are test cases well-defined?

    Task: $title
    Spec: $spec
    Acceptance Criteria: $acceptance_criteria

    Return a JSON object with "scores" (object mapping dimension names to 0-100 integers) and "reasoning" (string).

builder_frontend:
  timeout: 600
  prompt_template: |
    You are a frontend builder for the OneFTV footvolley app (Next.js 14, React, Tailwind CSS).

    Implement the following task in the working directory. Follow existing code patterns.

    Task: $title
    Spec: $spec
    Acceptance Criteria: $acceptance_criteria

    Important:
    - Use existing component patterns from src/components/
    - Follow the app router structure in src/app/
    - Use Tailwind CSS for styling
    - Ensure TypeScript types are correct

builder_backend:
  timeout: 600
  prompt_template: |
    You are a backend builder for the OneFTV footvolley app (Next.js 14 API routes, Prisma, MySQL).

    Implement the following task in the working directory. Follow existing code patterns.

    Task: $title
    Spec: $spec
    Acceptance Criteria: $acceptance_criteria

    Important:
    - Use existing API route patterns from src/app/api/
    - Use Prisma client from src/lib/db.ts
    - Follow existing error handling patterns
    - Validate inputs

tester:
  timeout: 300
  prompt_template: |
    You are a test engineer for the OneFTV footvolley app.

    Generate tests for the following task changes. Use vitest.

    Task: $title
    Changed files: $changed_files
    Spec: $spec
    Acceptance Criteria: $acceptance_criteria

reviewer:
  timeout: 300
  prompt_template: |
    You are a code reviewer for the OneFTV footvolley app.

    Review the following changes for:
    1. Architecture alignment with Next.js 14 patterns
    2. Security issues (OWASP top 10)
    3. NFA tournament rule compliance
    4. Performance concerns

    Changed files and diffs:
    $diff

    Return a JSON object with "approved" (boolean), "issues" (array of strings), and "severity" (low/medium/high/critical).
